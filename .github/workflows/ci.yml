name: Code quality

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv lock --locked

  lint:
    runs-on: ubuntu-latest
    needs: lockfile
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked --group dev
      - run: uv run ruff check

  format:
    runs-on: ubuntu-latest
    needs: lockfile
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked --group dev
      - run: uv run ruff format --check

  typecheck:
    runs-on: ubuntu-latest
    needs: lockfile
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked --group dev
      - run: uv run mypy

  test:
    runs-on: ubuntu-latest
    needs: lockfile
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - name: Install system deps for PyQt5
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 \
            libegl1 \
            libxkbcommon0 \
            libdbus-1-3
      - run: uv sync --locked --group dev
      - run: uv run pytest test/ -v

  build:
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, test]
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv build
